<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Legal AI Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Contract analysis workspace">
        <canvas id="contract-scene" aria-label="3D contract risk scene"></canvas>
        <div class="topbar">
          <div>
            <p class="eyebrow">Legal AI Assistant</p>
            <h1>Contract Risk Workspace</h1>
          </div>
          <div class="status-strip" aria-live="polite">
            <span id="status-pill">Ready</span>
            <span id="clause-count">0 clauses</span>
            <span id="risk-score">0.0 risk</span>
          </div>
        </div>
        <aside class="input-panel" aria-label="Analysis controls">
          <div class="mode-row" role="group" aria-label="Workspace mode">
            <button id="mode-analyze" class="active" type="button">Analyze</button>
            <button id="mode-compare" type="button">Compare</button>
          </div>

          <label class="file-target" for="contract-file">
            <span>Upload</span>
            <strong id="file-name">Primary contract</strong>
          </label>
          <input id="contract-file" type="file" accept=".txt,.html,.htm,.pdf,.docx" />

          <label>
            <span>Paste Text</span>
            <textarea id="contract-text" rows="8" placeholder="Paste a contract section here"></textarea>
          </label>

          <div class="control-grid">
            <label>
              <span>Type</span>
              <select id="contract-type">
                <option value="unknown">Unknown</option>
                <option value="nda">NDA</option>
                <option value="saas">SaaS</option>
                <option value="employment">Employment</option>
                <option value="sow">SOW</option>
                <option value="msa">MSA</option>
                <option value="lease">Lease</option>
                <option value="vendor">Vendor</option>
              </select>
            </label>
            <label>
              <span>Depth</span>
              <select id="analysis-depth">
                <option value="standard">Standard</option>
                <option value="quick">Quick</option>
                <option value="deep">Deep</option>
              </select>
            </label>
          </div>

          <label>
            <span>Jurisdiction</span>
            <input id="jurisdiction" value="New York" />
          </label>

          <div class="button-row">
            <button id="sample-button" type="button" title="Load sample contract">Sample</button>
            <button id="analyze-button" type="button">Analyze</button>
          </div>

          <div id="compare-inputs" class="secondary-input" hidden>
            <label class="file-target" for="compare-file">
              <span>Compare Against</span>
              <strong id="compare-file-name">Revised contract</strong>
            </label>
            <input id="compare-file" type="file" accept=".txt,.html,.htm,.pdf,.docx" />

            <label>
              <span>Revised Text</span>
              <textarea id="compare-text" rows="6" placeholder="Paste the revised version here"></textarea>
            </label>
          </div>
        </aside>

        <aside class="results-panel" aria-label="Analysis results">
          <div class="summary-band">
            <p id="summary-text">Upload or paste a contract to begin.</p>
          </div>
          <div class="risk-band">
            <div>
              <span>Level</span>
              <strong id="risk-level">None</strong>
            </div>
            <div>
              <span>Missing</span>
              <strong id="missing-count">0</strong>
            </div>
          </div>
          <div class="tool-row">
            <input id="clause-search" placeholder="Search clauses" aria-label="Search clauses" />
            <select id="risk-filter" aria-label="Filter by risk">
              <option value="all">All risks</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="export-row" aria-label="Export report">
            <button id="export-json" type="button">JSON</button>
            <button id="export-markdown" type="button">Markdown</button>
            <button id="export-html" type="button">HTML</button>
          </div>
          <div id="compare-summary" class="compare-summary" hidden></div>
          <div id="obligation-panel" class="obligation-panel" aria-label="Obligations by party"></div>
          <div id="clause-list" class="clause-list" aria-label="Detected clauses"></div>
        </aside>
      </section>
    </main>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="/static/app.js?v=6"></script>
  </body>
</html>
